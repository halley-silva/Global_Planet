<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="informações">
            <header class="cabeçalho">
                <div class="logo">
                    <img src="../../assets/logo-global-planet.png" width="200px">
                </div>
               
            </header>

            <main>

                <h1>Olá Cadastre-se</h1>
                <p id="texto">Descubra novas aventuras</p>
                
                <footer class="formulario">
                    <input type="text" placeholder="Nome" id="input_nome">
                    <input type="email" placeholder="Gmail" id="input_gmail">
                  
                    <input type="text" placeholder="Endereço" id="input_endereço">
                    <input type="password" placeholder="Senha" id="input_senha">
                    <input type="password" placeholder="Confirme Senha" id="input_confirmarSenha">
                </footer>
            </main>

            <section class="final">
                <button class="botão" type="submit">Salvar</button>
            </section>

        </div>
        <div class="imagen">

        </div>
    </div>


</body>
<script src="scrip.js"></script>
</html>
