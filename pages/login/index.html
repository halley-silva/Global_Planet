<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@100..900&family=Pompiere&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="caixa">

        <div class="imagenn">
            <div class="posicionar_imagen">

            </div>





        </div>

        <div class="login">
            <header>
                <img id="logo" src="../../assets/logo-global-planet.png" width="200px">

            </header>




            <main>

                <div class="titulo">
                    <h2>Olá</h2>
                    <p>Hey, Sentimos muito a sua falta.</p>
                </div>

                <div class="formulario">
                    <form onsubmit ="login(event)">
                        <div class="inputs">
                            <input type="email" placeholder="Gmail" class="inputs-login" id="input_gmail">
                            <input type="password" placeholder="senha" class="inputs-login" id="input_senha">
                        </div>

                        <div>
                            <p id="texto_erro" class="erro">GMAIL OU SENHA INVALIDOS</p>
                        </div>



                        <div class="conjunto">
                            <div class="lembrar">
                                <p>Lembrar</p>
                                <input type="checkbox" name="" >

                            </div>

                            <div class="esqueci">
                                <a href="../esqueceu-senha/" id="esqueci-senha">Esqueci senha</a>
                            </div>


                        </div>

                        <div class="botão">

                            <!-- Colocar onclick para executar a função -->
                            <button id="Enviar" type="submit">Enviar</button>


                        </div>


                    </form>

                   

                    <div class="sem_conta">

                        <p class="não_conta">Não tem conta ?</p> <a href="../../pages/Cadastrar/index.html"
                            id="Clique-aqui-link"> Clique aqui

                        </a>

                    </div>
                </div>
            </main>




        </div>






    </div>


</body>
<script src="scrip.js"></script>


</html>
