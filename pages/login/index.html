
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@100..900&family=Pompiere&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="caixa">

        <div class="imagenn">
            
        </div>

        <div class="login">
            <header>
                <img id="logo" src="../../assets/logo-gloabl-planet-preta.png" width="200px">

            </header>
            

            <main>

                <div class="titulo">
                    <h2>Olá</h2>
                    <p>Hey, Sentimos muito a sua falta.</p>
                </div>

                <div class="formulario">
                    <form>
                        <div class="inputs">
                            <input type="email" placeholder="Gmail" class="inputs-login" id="input_gmail">
                            <input type="password" placeholder="senha" class="inputs-login" id="input_senha">
                        </div>

                        <div>
                            <p id="texto_erro" class="erro">Login ou senha errados</p>
                        </div>

                        <section class="marcar">
                            <div id="caixinha">
                                <input type="checkbox">
                                <p>Lembra-me</p>
                            </div>

                            
                            <div>
                                <a href="../esqueceu-senha/" id="esqueci-senha">Esqueci a senha</a>
                            </div>
                        </section>

                        
                    </form>

                    <div class="botão">

                        <!-- Colocar onclick para executar a função -->
                        <button id="Enviar" onclick="verificar_login()">Enviar</button>
                    

                    </div>

                    <div class="sem_conta">
                        <p>Não tem conta ?<a href="../../pages/Cadastrar/index.html" id="Clique-aqui-link"> Clique aqui !</a></p>
                    </div>
                </div>
            </main>

            

        </div>
        

    </div>


</body>

</html>
