<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="informações">
            <header class="cabeçalho">
                <div class="logo">
                    <img src="../../assets/logo-gloabl-planet-preta.png" width="200px">
                </div>
               
                <h1>Olá Cadastre-se</h1>
                <p id="texto">Descubra novas aventuras</p>
                
            </header>

            <main>
                <footer class="formulario">
                    <input type="text" placeholder="Nome">
                    <input type="email" placeholder="Gmail">
                    <div class="generos">
                        <p id="paragrafo-genero">Genero</p>
                        <div class="sexo">
                            <label>Masculino</label>
                            <input type="checkbox">
                            <label>Feminino</label>
                            <input type="checkbox">
                        </div>
                        <div class="outro">
                            <label>Outros</label>
                            <input type="checkbox">
                        </div>
                    </div>
                    <input type="text" placeholder="Endereço">
                    <input type="password" placeholder="Senha">
                    <input type="password" placeholder="Confirme Senha">
                </footer>
            </main>

            <section class="final">
                <button class="botão" type="submit">Salvar</button>
            </section>

        </div>
        <div class="imagen">

        </div>
    </div>


</body>

</html>
